<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script th:src="@{/js/rangoFormulario}" defer></script>

    <script th:src="@{/js/validacion.js}" defer></script>
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-12 col-lg-10 d-flex flex-column align-items-center">

                <div class="w-100 p-4" style="max-width: 650px;">

                    <form method="post" class="needs-validation" th:action="${examen.idExamen != null} ? @{/editExamen} : @{/crearExamen}"
                        th:object="${examen}" novalidate>

                        <h2 class="fw-bold mb-3" th:text="${examen.idExamen != null} ? 'Editar Examen' : 'Crear Examen'">Crear Examen</h2>

                        <hr class="mb-4" />

                        <input type="hidden" th:field="*{idExamen}">

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Nombre del examen</label>
                            <input type="text" class="form-control form-control-lg fs-6" name="nombre"
                                th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" required minlength="4" maxlength="75">
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span></div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleFormControlTextarea1" class="form-label fw-semibold">Descripción del
                                examen</label>
                            <textarea class="form-control fs-6" rows="3" name="descripcion"
                                th:field="*{descripcion}" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'" required maxlength="250"></textarea>
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span></div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleFormControlTextarea1" class="form-label fw-semibold">Asignatura</label>
                            <select class="form-select form-select-md" aria-label="Small select example"
                                name="asignatura" th:field="*{asignatura}" th:classappend="${#fields.hasErrors('asignatura')} ? 'is-invalid'" required>
                                <option value="">Escoge aquí tu asignatura</option>
                                <option th:each="especialidad : ${especialidades}" th:value="${especialidad}" th:text="${especialidad}"></option>
                            </select>
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('asignatura')}" th:errors="*{asignatura}"></span></div>
                        </div>

                        <div th:if="${isAdmin}" class="mb-4">
                            <label class="form-label fw-semibold">Profesor Asignado</label>
                            <select class="form-select form-select-md" name="profesorDni" required>
                                <option value="">Selecciona un profesor</option>
                                <option th:each="prof : ${listaProfesores}" 
                                        th:value="${prof.dni}" 
                                        th:text="${prof.nombre} + ' ' + ${prof.primerApellido}"
                                        th:selected="${examen.profesor != null and examen.profesor.dni == prof.dni}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="range1" class="form-label fw-semibold">Duración Máxima (min)</label>
                            <input type="range" class="form-range " id="range1" name="duracionMinutos"
                                th:field="*{duracionMinutos}">

                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="fecha" class="form-label fw-semibold">Fecha y Hora</label>
                                <input type="datetime-local" class="form-control form-control-lg fs-6" id="fecha" name="fecha"
                                    th:field="*{fecha}" th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'" required>
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></span></div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label for="aula" class="form-label fw-semibold">Aula</label>
                                <input type="text" class="form-control form-control-lg fs-6" id="aula" name="aula" th:field="*{aula}" th:classappend="${#fields.hasErrors('aula')} ? 'is-invalid'" required>
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('aula')}" th:errors="*{aula}"></span></div>
                            </div>
                        </div>


                        <button type="submit" class="btn btn-redPrimary btn-lg w-100 rounded-pill mt-2" th:text="${examen.idExamen != null} ? 'Editar Examen' : 'Crear Examen'">Crear Examen</button>
                    </form>

                </div>

            </div>

        </div>
    </div>


</body>

</html>
