<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script th:src="@{/js/rangoFormulario}" defer></script>
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10 d-flex flex-column align-items-center">

                <div class="w-100 p-4" style="max-width: 650px;">

                    <h2 class="fw-bold mb-3">Crear Examen</h2>
                    <hr class="mb-4" />

                    <form method="post" th:action="@{/crearExamen}" th:object="${examen}">
                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Nombre del examen</label>
                            <input type="text" class="form-control form-control-lg fs-6" name="nombre" th:text="${nombre}">
                        </div>

                        <div class="mb-4">
                            <label for="exampleFormControlTextarea1" class="form-label fw-semibold">Descripción del
                                examen</label>
                            <textarea class="form-control fs-6" rows="3" name="descripcion" th:text="${descripcion}"></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="exampleFormControlTextarea1" class="form-label fw-semibold">Asignatura</label>
                            <select class="form-select form-select-md" aria-label="Small select example" name="asignatura">
                                <option selected>Escoge aquí tu asignatura</option>
                                <option value="Matematicas">Matematicas</option>
                                <option value="Fisica">Fisica</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="range1" class="form-label fw-semibold">Duración Máxima (min)</label>
                            <input type="range" class="form-range " id="range1" name="duracionMinutos" th:text="${duracionMinutos}">
                            
                        </div>

                        <div class="mb-4 w-25">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Puntuación Máxima</label>
                            <input type="number" class="form-control form-control-lg fs-6" name="puntuacionMax" th:text="${puntuacionMax}">
                        </div>

                        <button type="submit" class="btn btn-redPrimary btn-lg w-100 rounded-pill mt-2">Crear Examen</button>
                    </form>

                </div>

            </div>

        </div>
    </div>


</body>

</html>
