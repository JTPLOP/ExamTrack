<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripciones - ExamTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-12 col-lg-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="my-4 ms-5 ps-3">
                        <h1 class="display-5 fw-semibold">Inscripciones</h1>
                        <h3 class="display-5 fw-semibold fs-5 text-muted" th:text="${examen.nombre}">Examen x</h3>
                    </div>
                </div>

                <div class="card bg-light border-light-subtle shadow-sm rounded-3 mb-4 w-75 mx-auto">
                    <div class="card-body p-4">

                        <div class="mb-4">
                            <h5 class=" fw-semibold mb-0">Detalles: <span th:text="${examen.nombre}"></span></h5>
                            <hr class="text-muted my-2">
                        </div>

                        <div class="row g-3 mx-auto justify-content-center">

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">COD.
                                    Convocatoria</small>
                                <span class="text-dark" th:text="${examen.idExamen}"></span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Asignatura</small>
                                <span class="text-dark" th:text="${examen.asignatura}">Nombre de Asignatura</span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Profesor</small>
                                <span class="text-dark"
                                    th:text="${examen.profesor != null ? examen.profesor.nombre : 'No asignado'}">Nombre
                                    Profesor</span>
                            </div>

                            <div class="col-md-3 col-sm-6 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Fecha y Hora</small>
                                <span class="text-dark" th:text="${examen.fecha}">01/01/2026</span>
                            </div>

                            <div class="col-md-3 col-sm-6 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Aula</small>
                                <span class="text-dark" th:text="${examen.aula}">Aula X</span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Plazas Disp.</small>
                                <span class="text-dark">0 / <span th:text="${examen.numPlazas}"></span> </span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Duración examen</small>
                                <span class="text-dark"><span th:text="${examen.duracionMinutos}"></span> (min)</span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Puntuacion máxima</small>
                                <span class="text-dark">0 / <span th:text="${examen.puntuacionMax}"></span></span>
                            </div>

                        </div>

                    </div>
                </div>

                <div class="card bg-light border-light-subtle shadow-sm rounded-3 mb-4 mx-auto">
                    <div class="card-body p-4">

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="fw-semibold mb-0">
                                    Alumnos (<span th:text="${examen.asignatura}">Por definir</span>)
                                </h5>
                                
                            </div>
                            <hr class="text-muted my-2">
                        </div>

                        <div th:each="alumnos : ${alumno}">

                            <div class="list-group-item px-0 py-3 bg-transparent"
                                th:if="${validacion or #lists.contains(dniInscritos, alumnos.dni)}">

                                <div class="row align-items-center mx-auto g-3">

                                    <div class="col-1 text-center">
                                        <a th:href="@{/perfil/alumno/{id}(id=${alumnos.dni})}"
                                            class="d-inline-block text-decoration-none">
                                            <img th:src="${alumnos.fotoPerfil ?: 'https://imgs.search.brave.com/UV5h1t8kUzXcIO0GMsAQlWsqZq99iqtb2wwQREXGgDo/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzLzJjLzNi/L2Y2LzJjM2JmNmRj/ZjY0MTk3YTMwZWUx/ZWZlYTdkMTk4ZGRk/LmpwZw'}"
                                                class="rounded-circle object-fit-cover" width="50" height="50"
                                                alt="Foto">
                                        </a>
                                    </div>

                                    <div class="col-md-2 text-center text-md-start">
                                        <h6 class="mb-0 fw-semibold text-dark"
                                            th:text="${alumnos.nombre + ' ' + alumnos.primerApellido}">
                                            Nombre Apellido
                                        </h6>
                                    </div>

                                    <div class="col-md-2 text-center text-md-start">
                                        <h6 class="badge bg-danger text-light rounded-pill px-2.5 py-1.5"
                                            th:text="${alumnos.email}">
                                            Email
                                        </h6>
                                    </div>

                                    <div class="col-2 text-center">
                                        <span
                                            class="badge bg-primary-subtle text-primary-emphasis rounded-pill px-2.5 py-1.5"
                                            th:text="${alumnos.grupo}">Grupo</span>
                                    </div>

                                    <div class="col-3 text-center">
                                        <button type="button" class="btn btn-sm btn-primary fw-medium px-3 text-nowrap"
                                            th:disabled="${validacion}" data-bs-toggle="modal"
                                            th:data-bs-target="'#evaluarModal-' + ${alumnos.dni}">
                                            Evaluar Alumno
                                        </button>
                                    </div>

                                    <div class="col-auto d-flex gap-2 justify-content-center">
                                        <form
                                            th:action="@{/examen/inscripciones/{idInscripcion}/{idAlumno}(idInscripcion=${examen.idExamen}, idAlumno=${alumnos.dni})}"
                                            th:method="post">

                                            <button th:if="${#lists.contains(dniInscritos, alumnos.dni)}" type="submit"
                                                class="btn btn-sm btn-danger fw-medium px-3 text-nowrap"
                                                th:disabled="${!validacion}">
                                                Desasignar
                                            </button>

                                            <button th:unless="${#lists.contains(dniInscritos, alumnos.dni)}"
                                                type="submit" class="btn btn-sm btn-success fw-medium px-3 text-nowrap"
                                                th:disabled="${!validacion}">
                                                Asignar
                                            </button>
                                        </form>
                                    </div>

                                </div>
                            </div>

                            <div class="modal fade" th:id="'evaluarModal-' + ${alumnos.dni}" tabindex="-1"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-3 shadow">

            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-semibold text-dark">
                    Evaluando al alumno: <span
                        th:text="${alumnos.nombre + ' ' + alumnos.primerApellido}"
                        class="text-primary">Nombre</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>

            <div class="px-3">
                <hr class="text-muted my-2">
            </div>

            <div class="modal-body pt-2">
                <form th:action="@{/examen/inscripciones/{idExamen}/evaluar/{idAlumno}(idExamen=${examen.idExamen}, idAlumno=${alumnos.dni})}"
                    method="get"
                    th:each="inscrip : ${alumnos.inscripcion}"
                    th:if="${inscrip.examen.idExamen == examen.idExamen}">

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">
                            Nota del alumno (Máx: <span th:text="${examen.puntuacionMax}">10</span>)
                        </label>
                        <input type="number" step="0.1" min="0"
                            th:max="${examen.puntuacionMax}" name="nota"
                            class="form-control" placeholder="Introducir calificación"
                            th:value="${inscrip.calificacion}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Observación</label>
                        <textarea name="observacion" class="form-control" rows="3"
                            maxlength="255" style="resize: none;"
                            placeholder="Escribe los comentarios o detalles aquí..."
                            th:text="${inscrip.observaciones}"></textarea>
                    </div>

                    <hr class="text-muted my-3">

                    <div class="d-flex justify-content-between gap-2">
                        <button type="submit" name="accion" value="1"
                            class="btn btn-outline-danger fw-medium px-3">
                            No se presentó
                        </button>

                        <button type="submit" name="accion" value="2"
                            class="btn btn-success fw-medium px-4">
                            Enviar evaluación
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

</body>

</html>
