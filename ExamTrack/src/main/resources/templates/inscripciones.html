<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripciones - ExamTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="my-4 ms-5 ps-3">
                        <h1 class="display-5 fw-semibold">Inscripciones</h1>
                        <h3 class="display-5 fw-semibold fs-5 text-muted" th:text="${examen.nombre}">Examen x</h3>
                    </div>
                </div>

                <div class="card bg-light border-light-subtle shadow-sm rounded-3 mb-4 w-75 mx-auto">
                    <div class="card-body p-4">

                        <div class="mb-4">
                            <h5 class="text-secondary fw-semibold mb-0">Detalles: <span
                                    th:text="${examen.nombre}"></span></h5>
                            <hr class="text-muted my-2">
                        </div>

                        <div class="row g-3 mx-auto justify-content-center">

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">COD.
                                    Convocatoria</small>
                                <span class="text-dark" th:text="${examen.idExamen}"></span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Asignatura</small>
                                <span class="text-dark" th:text="${examen.asignatura}">Nombre de Asignatura</span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Profesor</small>
                                <span class="text-dark"
                                    th:text="${examen.profesor != null ? examen.profesor.nombre : 'No asignado'}">Nombre
                                    Profesor</span>
                            </div>

                            <div class="col-md-3 col-sm-6 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Fecha y Hora</small>
                                <span class="text-dark" th:text="${examen.fecha}">01/01/2026</span>
                            </div>

                            <div class="col-md-3 col-sm-6 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Aula</small>
                                <span class="text-dark" th:text="${examen.aula}">Aula X</span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Plazas Disp.</small>
                                <span class="text-dark" th:text="${examen.numPlazas}">0</span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Duración examen</small>
                                <span class="text-dark"><span th:text="${examen.duracionMinutos}"></span> (min)</span>
                            </div>

                            <div class="col-md-3 col-sm-12 text-center">
                                <small class="text-muted d-block text-uppercase fw-semibold">Puntuacion máxima</small>
                                <span class="text-dark">0/<span th:text="${examen.puntuacionMax}"></span></span>
                            </div>

                        </div>

                    </div>
                </div>

                <div class="card bg-light border-light-subtle shadow-sm rounded-3 mb-4  mx-auto">
                    <div class="card-body p-4">

                        <div class="mb-4">
                            <h5 class="text-secondary fw-semibold mb-0">Lista de Alumnos</h5>
                            <hr class="text-muted my-2">
                        </div>

                    </div>
                </div>

            </div>
        </div>

</body>

</html>
