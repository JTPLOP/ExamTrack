<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Exámenes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-12 col-lg-10">

                <div class="my-4 ms-5 ps-3 border-bottom border-2 pb-3">
                    <h1 class="display-5 fw-bold">Calendario</h1>
                </div>

                <div class="w-75 mx-auto mt-5">

                    <div class="d-flex justify-content-center mb-4">

                        <form th:action="@{/calendario}" method="get" class="d-flex align-items-center gap-4">

                            <h3 class="fw-bold m-0 display-6 fs-3 text-dark text-nowrap mx-4" th:text="${nombreMes}">
                                Mayo
                            </h3>

                        </form>
                    </div>

                    <table class="table table-bordered border-dark border-3 align-top" style="table-layout: fixed;">
                        <tbody>
                            <tr th:each="row : ${#numbers.sequence(0, (diasMes - 1) / 7)}">
                                <td th:each="col : ${#numbers.sequence(1, 7)}" th:with="dia=${row * 7 + col}"
                                    class="p-2 text-start" th:classappend="${dia > diasMes} ? 'table-light' : ''">

                                    <div th:if="${dia <= diasMes}" class="overflow-hidden"
                                        style="height: 120px; max-height: 120px;">
                                        <span class="fs-6 fw-bold mb-1 d-block" th:text="${dia}">1</span>

                                        <div th:with="examenesDia=${examenes.?[fecha.getDayOfMonth() == __${dia}__]}"
                                            class="mt-1">
                                            <div class="row g-1">

                                                <div th:each="examen, iterStat : ${examenesDia}"
                                                    th:if="${iterStat.index < 5}" class="col-6">

                                                    <a th:href="@{/examen/inscripciones/{id}(id=${examen.idExamen})}"
                                                        class="badge bg-danger text-start text-nowrap text-truncate p-1 d-block text-decoration-none text-white fs-7 shadow-sm">
                                                        <i class="bi bi-file-earmark-text-fill small"></i>
                                                        <span th:text="${examen.nombre}">Examen</span>
                                                    </a>
                                                </div>

                                                <div th:if="${examenesDia.size() > 5}" class="col-6">
                                                    <span
                                                        class="badge bg-secondary p-1 d-block text-center fw-bold fs-7 shadow-sm text-white">+</span>
                                                </div>

                                            </div>
                                        </div>

                                    </div>
                                </td>
                            </tr>
                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
