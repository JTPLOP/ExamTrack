<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - ExamTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div class="container-fluid">
        <div class="row min-vh-100">

            <th:block th:if="${profesorLogueado != null or alumnoLogueado != null or usuario != null}">
                <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>
            </th:block>

            <div class="col d-flex flex-column justify-content-center align-items-center bg-light p-5">
                
                <div class="text-center">
                    <h1 class="display-3 fw-bold text-danger mb-2" th:text="${status != null ? status : 'Error'}">404</h1>
                    <h3 class="fw-normal text-dark mb-4" th:text="${error != null ? error : 'Ha ocurrido un problema'}">Not Found</h3>
                    
                    <p class="text-muted mb-4" th:text="${message != null and !message.isEmpty() ? message : 'La página solicitada no está disponible.'}">
                        La página solicitada no está disponible.
                    </p>

                    <a th:href="@{/inicio}" class="btn btn-outline-dark px-4 py-2">Volver al Inicio</a>
                </div>

            </div>

        </div>
    </div>

</body>

</html>
