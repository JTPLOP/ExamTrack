<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10">
                <div class="my-4 ms-5 ps-3">
                    <h1 class="display-5 fw-semibold">Alumnos</h1>
                </div>
                <div class="container">

                    <div class="row mb-4 align-items-center">
                        <div class="col-9">
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="Buscar alumno...">
                                <select class="form-select">
                                    <option selected>Filtrar por Grupo </option>
                                    <option value="primero">Primero </option>
                                </select>
                                <select class="form-select">
                                    <option selected>Filtrar por Asignaturas</option>
                                    <option value="matematicas">Matematicas </option>
                                </select>
                            </div>
                        </div>

                        <div class="col-3">
                            <a th:href="@{/formAlumno}" class="btn btn-redPrimary w-100">Crear Alumno</a>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <div class="list-group list-group-flush">

                                <div class="list-group-item px-0 py-3 bg-transparent" th:each="alumnos : ${alumno}">
                                    <div class="row align-items-center">

                                        <div class="col-md-1">
                                            <a th:href="@{/perfil/alumno/{id}(id=${alumnos.dni})}"
                                                class="d-inline-block text-decoration-none">
                                                <img th:src="${alumnos.fotoPerfil ?: 'https://via.placeholder.com/50'}"
                                                    class="rounded-circle object-fit-cover" width="50" height="50"
                                                    alt="Foto">
                                            </a>
                                        </div>

                                        <div class="col-md-2">
                                            <h6 class="mb-0 fw-semibold text-dark"
                                                th:text="${alumnos.nombre + ' ' + alumnos.primerApellido}">Nombre
                                                Apellido</h6>
                                            <small class="text-muted"
                                                th:text="${alumnos.email}">email@ejemplo.com</small>
                                        </div>

                                        <div class="col-md-2">
                                            <small
                                                class="text-muted d-block mb-1 text-uppercase fs-7 fw-medium tracking-wider">Nacimiento</small>
                                            <span class="text-secondary small"
                                                th:text="${alumnos.fechaNacimiento}">12/05/2000</span>
                                        </div>

                                        <div class="col-md-2">
                                            <small
                                                class="text-muted d-block mb-1 text-uppercase fs-7 fw-medium tracking-wider">Curso</small>
                                            <span
                                                class="badge bg-primary-subtle text-primary-emphasis rounded-pill px-2.5 py-1.5"
                                                th:text="${alumnos.grupo}">Grupo</span>
                                        </div>

                                        <div class="col-md-2">
                                            <small
                                                class="text-muted d-block mb-1 text-uppercase fs-7 fw-medium tracking-wider">Asignaturas</small>
                                            <span
                                                class="badge bg-secondary-subtle text-secondary-emphasis text-wrap text-start fw-normal"
                                                th:text="${alumnos.asignaturas != null and alumnos.asignaturas != '' ? alumnos.asignaturas : 'Sin asignaturas'}">
                                                Asignaturas
                                            </span>
                                        </div>

                                        <div class="col-md-3 d-flex gap-2 justify-content-end">
                                            <a th:href="@{/perfil/alumno/{id}(id=${alumnos.dni})}"
                                                class="btn btn-sm btn-secondary fw-medium px-3 text-nowrap">
                                                Perfil
                                            </a>
                                            <a th:href="@{/editar/alumno/{id}(id=${alumnos.dni})}"
                                                class="btn btn-sm btn-secondary fw-medium px-3 text-nowrap">
                                                Editar
                                            </a>
                                            <a th:href="@{/eliminar/alumno/{id}(id=${alumnos.dni})}"
                                                class="btn btn-sm text-white bg-danger bg-opacity-75 fw-medium px-3 text-nowrap">
                                                Eliminar
                                            </a>
                                        </div>

                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>


</body>

</html>
