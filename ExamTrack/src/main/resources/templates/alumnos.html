<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10">
                <div class="container">
                    <div class="row mb-3">
                        <div class="col-12">
                            <h1>LISTA DE ALUMNOS</h1>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-9">
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="Buscar alumno...">
                                <select class="form-select">
                                    <option selected>Filtrar por Grupo </option>
                                    <option value="primero">Primero </option>
                                </select>
                                <select class="form-select">
                                    <option selected>Filtrar por Asignaturas</option>\
                                    <option value="matematicas">Matematicas </option>
                                </select>
                            </div>
                        </div>

                        <div class="col-3">
                            <a th:href="@{/formAlumno}" class="btn btn-redPrimary w-100">Crear Alumno</a>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th scope="col">DNI</th>
                                        <th scope="col">Nombre</th>
                                        <th scope="col">Primer Apellido</th>
                                        <th scope="col">Segundo Apellido</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Direccion</th>
                                        <th scope="col">Fecha Nacimiento</th>
                                        <th scope="col">Grupo</th>
                                        <th scope="col">Asignaturas</th>
                                        <th scope="col">Acciones</th> 
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="alumnos : ${alumno}">
                                        <th scope="row" th:text="${alumnos.dni}"></th>
                                        <td th:text="${alumnos.nombre}"></td>
                                        <td th:text="${alumnos.primerApellido}"></td>
                                        <td th:text="${alumnos.segundoApellido}"></td>
                                        <td th:text="${alumnos.email}"></td>
                                        <td th:text="${alumnos.direccion}"></td>
                                        <td th:text="${alumnos.fechaNacimiento}"></td>
                                        <td th:text="${alumnos.grupo}"></td>
                                        <td th:text="${alumnos.asignaturas}"></td>
                                        <td>
                                            
                                            <div class="btn-group btn-group-sm" role="group">
                                                <a th:href="@{/editar/alumno/{id}(id=${alumnos.dni})}"
                                                    class="btn btn-outline-primary">
                                                    <i class="bi bi-pencil-square"></i> Editar
                                                </a>
                                                <a th:href="@{/eliminar/alumno/{id}(id=${alumnos.dni})}"
                                                    class="btn btn-outline-primary">
                                                    <i class="bi bi-pencil-square"></i> Eliminar
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>


</body>

</html>
