<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10">
                <div class="my-4 ms-5 ps-3">
                    <h1 class="display-5 fw-semibold">Notificaciones</h1>
                </div>
                <div class="container my-4">
                    <div th:each="proximoExamen : ${proximosExamenes}"
                        class="bg-light border rounded-3 p-3 mb-3 d-flex align-items-center shadow-sm">

                        <img th:src="${profesor.fotoPerfil != null and !profesor.fotoPerfil.isEmpty() ? profesor.fotoPerfil : 'https://ui-avatars.com/api/?name=' + profesor.nombre + '&background=random'}"
                            th:alt="'Avatar de ' + ${profesor.nombre}" class="rounded-circle me-3"
                            style="width: 50px; height: 50px; object-fit: cover;">

                        <div class="flex-grow-1">
                            <h6 class="mb-1 fw-bold text-dark">
                                <span >Examen Pendiente: <span th:text="${proximoExamen.nombre}" class="text-muted"></span> </span>
                            </h6>
                            <p class="mb-0 text-secondary small">
                                Fecha: <span
                                    th:text="${proximoExamen.fecha}"></span>
                            </p>
                        </div>

                        <div class="ms-3">
                            <button class="btn btn-redPrimary btn-sm px-4 rounded-pill me-5">Acción</button>
                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
