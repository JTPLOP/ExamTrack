<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script th:src="@{/js/rangoFormulario}" defer></script>

    <script th:src="@{/js/validacion.js}" defer></script>
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-12 col-lg-10 d-flex flex-column align-items-center">

                <div class="w-100 p-4" style="max-width: 650px;">

                    <h2 class="fw-bold mb-3"
                        th:text="${profesor.dni != null and profesor.dni != ''} ? 'Editar Profesor' : 'Crear nuevo Profesor'">
                        Crear nuevo Profesor</h2>
                    <hr class="mb-4" />

                    <form method="post" class="needs-validation"
                        th:action="${profesor.dni != null and profesor.dni != ''} ? @{/admin/editProfesor} : @{/admin/crearProfesor}"
                        th:object="${profesor}" novalidate>

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Nombre</label>
                                <input type="text" class="form-control form-control-lg fs-6" name="nombre"
                                    th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                                    required minlength="2" maxlength="75">
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('nombre')}"
                                        th:errors="*{nombre}"></span></div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">DNI</label>
                                <input type="text" class="form-control form-control-lg fs-6" name="dni"
                                    th:field="*{dni}" th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'"
                                    required minlength="9" maxlength="9" pattern="[0-9]{8}[A-Za-z]"
                                    title="El DNI debe contener 8 números seguidos de una letra">
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('dni')}"
                                        th:errors="*{dni}"></span></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Apellidos </label>
                            <div class="input-group">
                                <span class="input-group-text">Introduzca aquí:</span>
                                <input type="text" aria-label="First name" class="form-control"
                                    placeholder="Primer Apellido" name="primerApellido" th:field="*{primerApellido}"
                                    th:classappend="${#fields.hasErrors('primerApellido')} ? 'is-invalid'" required
                                    minlength="2" maxlength="75">
                                <input type="text" aria-label="Last name" class="form-control"
                                    placeholder="Segundo Apellido" name="segundoApellido" th:field="*{segundoApellido}">
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('primerApellido')}"
                                        th:errors="*{primerApellido}"></span></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control form-control-lg fs-6" name="email"
                                th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                placeholder="usuario@ejemplo.com" required minlength="8" maxlength="355">
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></span></div>
                        </div>



                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Dirección</label>
                            <input type="text" class="form-control form-control-lg fs-6" name="direccion"
                                th:field="*{direccion}"
                                th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'" required minlength="4"
                                maxlength="100">
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('direccion')}"
                                    th:errors="*{direccion}"></span></div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Departamento</label>
                                <select class="form-select" name="departamento" th:field="*{departamento}">
                                    <option value="">Escoger opción</option>
                                    <option th:each="listaDepartamentos : ${listaDepartamento}"
                                        th:value="${listaDepartamentos.idDepartamento}"
                                        th:text="${listaDepartamentos.nombre}" required></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold d-block">Especialidades</label>
                            <div class="d-flex flex-wrap gap-3">
                                <div class="form-check form-check-inline m-0"
                                    th:each="especialidad : ${listaEspecialidad}">
                                    <input class="form-check-input border-secondary" type="checkbox"
                                        th:id="'esp_' + ${especialidad.idEspecialidad}" name="especialidades"
                                        th:value="${especialidad.idEspecialidad}" th:field="*{especialidades}">
                                    <label class="form-check-label" th:for="'esp_' + ${especialidad.idEspecialidad}"
                                        th:text="${especialidad.nombre}"></label>
                                </div>
                            </div>
                        </div>

                        <input type="hidden" class="form-control form-control-lg fs-6" name="password" value="Default">

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Fecha de
                                    nacimiento</label>
                                <input type="date" class="form-control form-control-lg fs-6" name="fechaNacimiento"
                                    th:field="*{fechaNacimiento}"
                                    th:classappend="${#fields.hasErrors('fechaNacimiento')} ? 'is-invalid'" required>
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('fechaNacimiento')}"
                                        th:errors="*{fechaNacimiento}"></span></div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Foto de perfil </label>
                                <input type="url" class="form-control form-control-lg fs-6" name="fotoPerfil"
                                    th:field="*{fotoPerfil}" placeholder="https:www/example.com">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-redPrimary btn-lg w-100 rounded-pill mt-2"
                            th:text="${profesor.dni != null and profesor.dni != ''} ? 'Editar Profesor' : 'Crear Profesor'">Crear
                            Profesor</button>
                    </form>

                </div>

            </div>

        </div>
    </div>


</body>

</html>
