<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Especialidad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script th:src="@{/js/validacion.js}" defer></script>
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-12 col-lg-10 d-flex flex-column align-items-center"> 

                <div class="w-100 p-4" style="max-width: 650px;">

                    <h2 class="fw-bold mb-3" th:text="${especialidad.idEspecialidad != null} ? 'Editar Especialidad' : 'Crear nueva Especialidad'">Crear nueva Especialidad</h2>
                    <hr class="mb-4" />

                    <form method="post" class="needs-validation" th:action="${especialidad.idEspecialidad != null} ? @{/admin/editEspecialidad} : @{/admin/crearEspecialidad}" th:object="${especialidad}" novalidate>

                        <input type="hidden" th:field="*{idEspecialidad}">

                        <div class="mb-4">
                            <label for="nombreEspecialidad" class="form-label fw-semibold">Nombre de la Especialidad</label>
                            <input type="text" id="nombreEspecialidad" class="form-control form-control-lg fs-6" name="nombre"
                                th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" required minlength="2" maxlength="100"
                                placeholder="Ej: Bases de Datos">
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span></div>
                        </div>

                        <button type="submit" class="btn btn-redPrimary btn-lg w-100 rounded-pill mt-2"
                            th:text="${especialidad.idEspecialidad != null} ? 'Guardar cambios' : 'Crear Especialidad'">Crear
                            Especialidad</button>
                    </form>

                </div>

            </div>

        </div>
    </div>


</body>

</html>
