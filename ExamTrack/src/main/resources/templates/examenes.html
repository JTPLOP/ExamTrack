<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10">
                <h1>Mis Examenes</h1>
                <div class="container">


                    <div class="row">

                        <div class="col-9">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th scope="col">Id</th>
                                        <th scope="col">Nombre</th>
                                        <th scope="col">Descripcion</th>
                                        <th scope="col">Asignatura</th>
                                        <th scope="col">Duracion (MIN)</th>
                                        <th scope="col">Puntuacion Maxima</th>

                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="examenes : ${examen}">
                                        <th scope="row" th:text="${examenes.id}"></th>
                                        <td th:text="${examenes.nombre}"></td>
                                        <td th:text="${examenes.descripcion}"></td>
                                        <td th:text="${examenes.asignatura}"></td>
                                        <td th:text="${examenes.duracionMinutos}"></td>
                                        <td th:text="${examenes.puntuacionMax}"></td>
                                        <td>
                                            <div class="btn-group btn-group-sm" role="group">
                                                <a th:href="@{/editar/examen/{id}(id=${examenes.id})}"
                                                    class="btn btn-outline-primary">
                                                    <i class="bi bi-pencil-square"></i> Editar
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                        </div>

                        <div class="col-3">

                        </div>


                    </div>
                </div>



            </div>

        </div>

    </div>


</body>

</html>
