<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10">
                <div class="my-4 ms-5 ps-3">
                    <h1 class="display-5 fw-semibold">Examenes</h1>
                </div>
                <div class="container my-4">

                    <div class="row g-3 mb-5 align-items-center bg-white p-3 rounded shadow-sm">
                        <div class="col-6 col-md-3">
                            <input type="text" class="form-control" placeholder="Buscar examen...">
                        </div>
                        <div class="col-6 col-md-2">
                            <select class="form-select">
                                <option selected>Estado (Todos)</option>
                                <option>Borrador</option>
                                <option>Activo</option>
                                <option>Finalizado</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-3">
                            <select class="form-select">
                                <option selected>Ordenar por...</option>
                                <option>Fecha más reciente</option>
                                <option>Nombre</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-2 text-md-end">
                            <a th:href="@{/examenes}" class="btn btn-redPrimary w-100">Filtrar</a>
                        </div>

                        <div class="col-12 col-md-2 text-md-end">
                            <a th:href="@{/formExamen}" class="btn btn-redPrimary w-100">Crear Examen</a>
                        </div>
                    </div>

                    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3">

                        <div class="col" th:each="examenes : ${examen}">
                            <div class="card h-100 p-3 shadow-sm bg-white border-2 border-light-subtle rounded-3">

                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="small text-secondary fw-semibold">
                                        ID: <span th:text="${examenes.idExamen}"></span>
                                    </span>
                                    <span
                                        class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1 fw-semibold">
                                        (Logica Activo)
                                    </span>
                                </div>

                                <h6 class="fw-bold text-dark mb-1 text-truncate" th:text="${examenes.nombre}"></h6>
                                <p class="small text-muted mb-4 text-truncate" th:text="${examenes.descripcion}"></p>

                                <div class="btn-group btn-group-sm w-100 mt-auto" role="group">
                                    <a th:href="@{/editar/examen/{id}(id=${examenes.idExamen})}"
                                        class="btn btn-outline-primary" title="Editar">
                                        <i class="bi bi-pencil-square"></i> Editar
                                    </a>

                                    <a th:href="@{/eliminar/examen/{id}(id=${examenes.idExamen})}"
                                        class="btn btn-outline-primary" title="Eliminar">
                                        <i class="bi bi-pencil-square"></i> Borrar
                                    </a>

                                    <a th:href="@{/examen/inscripciones/{id}(id=${examenes.idExamen})}"
                                        class="btn btn-outline-primary" title="Inscripciones">
                                        <i class="bi bi-people-fill"></i> Ver
                                    </a>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>



            </div>

        </div>

    </div>


</body>

</html>
