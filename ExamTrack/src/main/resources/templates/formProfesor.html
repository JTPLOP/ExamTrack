<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script th:src="@{/js/rangoFormulario}" defer></script>
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10 d-flex flex-column align-items-center"> 

                <div class="w-100 p-4" style="max-width: 650px;">

                    <h2 class="fw-bold mb-3">Crear nuevo Profesor</h2>
                    <hr class="mb-4" />

                    <form method="post" th:action="${profesor.dni != null} ? @{/editProfesor} : @{/crearProfesor}" th:object="${profesor}">

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Nombre</label>
                                <input type="text" class="form-control form-control-lg fs-6" name="nombre"
                                    th:field="*{nombre}">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">DNI</label>
                                <input type="text" class="form-control form-control-lg fs-6" name="dni"
                                    th:field="*{dni}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Apellidos </label>
                            <div class="input-group">
                                <span class="input-group-text">Introduzca aquí:</span>
                                <input type="text" aria-label="First name" class="form-control"
                                    placeholder="Primer Apellido" name="primerApellido" th:field="*{primerApellido}">
                                <input type="text" aria-label="Last name" class="form-control"
                                    placeholder="Segundo Apellido" name="segundoApellido" th:field="*{segundoApellido}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control form-control-lg fs-6" name="email"
                                th:field="*{email}" placeholder="usuario@ejemplo.com">
                        </div>

                        

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Dirección</label>
                            <input type="text" class="form-control form-control-lg fs-6" name="direccion"
                                th:field="*{direccion}">
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Departamento</label>
                                <select class="form-select" name="departamento" th:field="*{departamento}">
                                    <option value="">Escoger opción</option>
                                    <option th:each="listaDepartamentos : ${listaDepartamento}" th:value="${listaDepartamentos.idDepartamento}" th:text="${listaDepartamentos.nombre}" required></option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Especialidades</label>
                                <select id="inputState" class="form-select" name="especialidad" >
                                    <option value="">Escoger opción</option>
                                    <option th:each="listaEspecialidades : ${listaEspecialidad}" th:value="${listaEspecialidades.idEspecialidad}" th:text="${listaEspecialidades.nombre}" required></option>
                                    
                                </select>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Fecha de
                                    nacimiento</label>
                                <input type="date" class="form-control form-control-lg fs-6" name="fechaNacimiento"
                                    th:field="*{fechaNacimiento}">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Foto de perfil </label>
                                <input type="url" class="form-control form-control-lg fs-6" name="fotoPerfil"
                                    th:field="*{fotoPerfil}" placeholder="https:www/example.com">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-redPrimary btn-lg w-100 rounded-pill mt-2">Crear
                            Profesor</button>
                    </form>

                </div>

            </div>

        </div>
    </div>


</body>

</html>
