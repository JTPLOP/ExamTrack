<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-10">
                <div class="container">
                    <div class="row">
                        <div class="col-12">

                            <h1>LISTA DE PROFESORES</h1>
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th scope="col">DNI</th>
                                        <th scope="col">Nombre</th>
                                        <th scope="col">Primer Apellido</th>
                                        <th scope="col">Segundo Apellido</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Direccion</th>
                                        <th scope="col">Fecha Nacimiento</th>
                                        <th scope="col">Departamento</th>
                                        <th scope="col">Especialidad</th>
                                        <th scope="col">Examenes</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="profesores : ${profesor}">
                                        <th scope="row" th:text="${profesores.dni}"></th>
                                        <td th:text="${profesores.nombre}"></td>
                                        <td th:text="${profesores.primerApellido}"></td>
                                        <td th:text="${profesores.segundoApellido}"></td>
                                        <td th:text="${profesores.email}"></td>
                                        <td th:text="${profesores.direccion}"></td>
                                        <td th:text="${profesores.fechaNacimiento}"></td>
                                        <td th:text="${profesores.departamento}"></td>
                                        <td th:text="${profesores.especialidades}"></td>
                                        <td th:text="${profesores.examen}"></td>
                                        <td class="btn-group btn-group-sm" role="group">
                                            <a th:href="@{/editar/profesor/{id}(id=${profesores.dni})}"
                                                class="btn btn-outline-primary">
                                                <i class="bi bi-pencil-square"></i> Editar
                                            </a>
                                            <a th:href="@{/eliminar/profesor/{id}(id=${profesores.dni})}"
                                                class="btn btn-outline-primary">
                                                <i class="bi bi-pencil-square"></i> Eliminar
                                            </a>

                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>


</body>

</html>
