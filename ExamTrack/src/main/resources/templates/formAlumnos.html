<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script th:src="@{/js/rangoFormulario}" defer></script>

    <script th:src="@{/js/validacion.js}" defer></script>
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div th:replace="~{fragmentos/sidebar :: sidebarMenu}"></div>

            <div class="col-12 col-lg-10 d-flex flex-column align-items-center"> 

                <div class="w-100 p-4" style="max-width: 650px;">

                    <h2 class="fw-bold mb-3" th:text="${alumno.dni != null and alumno.dni != ''} ? 'Editar alumno' : 'Crear nuevo alumno'">Crear nuevo alumno</h2>
                    <hr class="mb-4" />

                    <form method="post" class="needs-validation" th:action="${alumno.dni != null} ? @{/editAlumno} : @{/crearAlumno}" th:object="${alumno}" novalidate>

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Nombre</label>
                                <input type="text" class="form-control form-control-lg fs-6" name="nombre"
                                    th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" required minlength="2" maxlength="75">
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span></div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">DNI</label>
                                <input type="text" class="form-control form-control-lg fs-6" name="dni"
                                    th:field="*{dni}" th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'" required minlength="9" maxlength="9">
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></span></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Apellidos </label>
                            <div class="input-group">
                                <span class="input-group-text">Introduzca aquí:</span>
                                <input type="text" aria-label="First name" class="form-control"
                                    placeholder="Primer Apellido" name="primerApellido" th:field="*{primerApellido}" th:classappend="${#fields.hasErrors('primerApellido')} ? 'is-invalid'" required minlength="2" maxlength="75" >
                                <input type="text" aria-label="Last name" class="form-control"
                                    placeholder="Segundo Apellido" name="segundoApellido" th:field="*{segundoApellido}" minlength="2" maxlength="75">
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('primerApellido')}" th:errors="*{primerApellido}"></span></div>
                            </div>
                        </div>


                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control form-control-lg fs-6" name="email"
                                th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="usuario@ejemplo.com" minlength="15" maxlength="100" required>
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span></div>
                        </div>

                        <div class="mb-4">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Dirección</label>
                            <input type="text" class="form-control form-control-lg fs-6" name="direccion"
                                th:field="*{direccion}" th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'" minlength="4" maxlength="100" required>
                            <div class="invalid-feedback"><span th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></span></div>
                        </div>


                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Grupo Asignado</label>
                                <select id="inputState" class="form-select" name="grupo" th:field="*{grupo}" th:classappend="${#fields.hasErrors('grupo')} ? 'is-invalid'" required>
                                    <option value="">Escoger opción</option>
                                    <option value="Primero">Primero</option>
                                    <option value="Segundo">Segundo</option>
                                    <option value="Tercero">Tercero</option>
                                    <option value="Cuarto">Cuarto</option>
                                </select>
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('grupo')}" th:errors="*{grupo}"></span></div>
                            </div>
                        </div>


                        <div class="mb-4">
                            <input type="text" hidden value="ALUMNO" name="rol">
                        </div>

                        <div class="mb-4">
                            <input type="text" hidden value="" name="password">
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Fecha de
                                    nacimiento</label>
                                <input type="date" class="form-control form-control-lg fs-6" name="fechaNacimiento"
                                    th:field="*{fechaNacimiento}" th:classappend="${#fields.hasErrors('fechaNacimiento')} ? 'is-invalid'" required>
                                <div class="invalid-feedback"><span th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></span></div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="exampleInputEmail1" class="form-label fw-semibold">Foto de perfil </label>
                                <input type="url" class="form-control form-control-lg fs-6" name="fotoPerfil"
                                    th:field="*{fotoPerfil}" placeholder="https:www/example.com">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-redPrimary btn-lg w-100 rounded-pill mt-2" th:text="${alumno.dni != null and alumno.dni != ''} ? 'Editar alumno' : 'Crear alumno'">Crear alumno</button>
                    </form>

                </div>

            </div>

        </div>
    </div>


</body>

</html>
