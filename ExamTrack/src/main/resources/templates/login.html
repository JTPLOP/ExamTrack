<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">



</head>

<body>

    <div class="container-fluid">
        <div class="row"></div>
        <div class="col-6">
            <h1>hola</h1>
        </div>

        <div class="col-6">
            <h2>Login</h2>
            <p>Bienvenido a ExamTrack! Porfavor inicie sesión en los campos indicados</p>

            <div>
                <form>
                    <div class="form-group pb-3">
                        <label for="formGroupExampleInput">Correo Electronico</label>
                        <input type="email" class="form-control" id="formGroupExampleInput" placeholder="Example input">
                    </div>
                    <div class="form-group pb-3">
                        <label for="formGroupExampleInput2">Contraseña</label>
                        <input type="password" class="form-control" id="formGroupExampleInput2" placeholder="Another input">
                    </div>
                    <button type="submit" class="btn btn-primary">Sign in</button>
                </form>

            </div>


        </div>

    </div>

</body>

</html>
